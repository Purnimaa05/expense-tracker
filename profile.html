<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>User Profile</h1>
    <p class="subtitle">Account Information</p>

    <div class="balance-box">
      <h2>Username</h2>
      <p id="usernameDisplay">Guest</p>
    </div>

    <div class="balance-box">
      <h2>Total Transactions</h2>
      <p id="totalTransactions">0</p>
    </div>

    <div class="balance-box">
      <h2>Member Since</h2>
      <p id="joinedDate">--</p>
    </div>

    <button id="logoutBtn">Logout</button>

    <a href="index.html">Back to Tracker</a>
  </div>

  <script src="profile.js"></script>

</body>
</html>
