<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Financial Report</h1>
    <p class="subtitle">Summary of your activity</p>

    <div class="balance-box">
      <h2>Total Transactions</h2>
      <p id="totalCount">0</p>
    </div>

    <div class="balance-box">
      <h2>Total Income</h2>
      <p id="totalIncome">₹ 0</p>
    </div>

    <div class="balance-box">
      <h2>Total Expense</h2>
      <p id="totalExpense">₹ 0</p>
    </div>

    <div class="balance-box">
      <h2>Net Balance</h2>
      <p id="netBalance">₹ 0</p>
    </div>

    <a href="index.html">Back to Tracker</a>
  </div>

  <script src="reports.js"></script>
</body>
</html>
